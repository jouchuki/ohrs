name: Release

# Builds and publishes the golden container image when a version tag is pushed.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# IMPORTANT: this workflow publishes to GitHub Container Registry (ghcr.io).
# It is wired but must be reviewed/enabled by a maintainer before the first
# real release — confirm the registry, owner, and that publishing is desired.

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  # Resolves to ghcr.io/<owner>/openharness-rs (lowercased by metadata-action).
  IMAGE_NAME: ${{ github.repository }}

jobs:
  image:
    name: build-and-push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Full semver from the git tag, e.g. v1.2.3 -> 1.2.3
            type=semver,pattern={{version}}
            # Major.minor, e.g. 1.2
            type=semver,pattern={{major}}.{{minor}}
            # Short commit SHA
            type=sha,format=short
            # `latest` only for non-prerelease tags
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pass version/revision into the image as build args for OCI labels.
          build-args: |
            OHRS_VERSION=${{ steps.meta.outputs.version }}
            OHRS_VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
